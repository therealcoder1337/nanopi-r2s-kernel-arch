name: Build NanoPi R2S kernel (linux-nanopi-r2s-minimal)

on:
  workflow_dispatch:
    inputs:
      pkgver:
        description: Kernel pkgver (e.g. 7.0.9)
        type: string
        default: ''
      pkgrel:
        description: Package pkgrel
        type: string
        default: '1'

permissions:
  contents: write

concurrency:
  group: build-kernel
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          # makepkg checks PKGBUILD depends/makedepends on the build host (even without -s).
          pacman -S --noconfirm --needed \
            base-devel \
            coreutils kmod mkinitcpio \
            aarch64-linux-gnu-gcc aarch64-linux-gnu-binutils \
            bc dtc python \
            git curl xz \
            openssl libelf \
            pacman-contrib gnupg ccache github-cli

      - name: Fetch ALARM tree
        run: ./scripts/fetch-alarm-sources.sh

      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.pkgver }}" ]; then
            pv="${{ inputs.pkgver }}"
            pr="${{ inputs.pkgrel }}"
            IFS=. read -r _major _minor _rest <<< "$pv"
            [ -n "$_major" ] && [ -n "$_minor" ] || {
              echo "Error: pkgver must include major.minor, got: $pv" >&2
              exit 1
            }
            mkdir -p build
            alarm_commit="$(git -C "$GITHUB_WORKSPACE/build/.alarm-pkgbuilds" rev-parse HEAD 2>/dev/null || true)"
            {
              echo "alarm_repo=https://github.com/archlinuxarm/PKGBUILDs.git"
              echo "alarm_commit=$alarm_commit"
              echo "pkgver=$pv"
              echo "pkgrel=$pr"
              echo "_srcname=linux-${_major}.${_minor}"
            } > build/alarm-version.env
          fi
          # shellcheck source=/dev/null
          source "$GITHUB_WORKSPACE/build/alarm-version.env"
          echo "pkgver=$pkgver" >> "$GITHUB_OUTPUT"
          echo "pkgrel=$pkgrel" >> "$GITHUB_OUTPUT"
          _major="${pkgver%%.*}"
          echo "major=$_major" >> "$GITHUB_OUTPUT"

      - name: Resolve publish names
        id: publish_names
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF_NAME" = "${{ github.event.repository.default_branch }}" ]; then
            tag="linux-nanopi-r2s-minimal-${{ steps.ver.outputs.pkgver }}-${{ steps.ver.outputs.pkgrel }}"
            echo "pages_branch=gh-pages" >> "$GITHUB_OUTPUT"
            echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
            echo "release_title=$tag" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            safe_ref="$(printf '%s' "$GITHUB_REF_NAME" | tr -c 'A-Za-z0-9._-' '-')"
            echo "pages_branch=gh-pages-test" >> "$GITHUB_OUTPUT"
            echo "release_tag=test-${safe_ref}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "release_title=Test build ${safe_ref} #${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache kernel sources
        uses: actions/cache@v5
        with:
          path: |
            build/linux-*.tar.xz
            build/patch-*.xz
          key: kernel-src-linux-${{ steps.ver.outputs.major }}-${{ steps.ver.outputs.pkgver }}-${{ steps.ver.outputs.pkgrel }}
          restore-keys: |
            kernel-src-linux-${{ steps.ver.outputs.major }}-

      - name: Cache compiler artifacts (ccache)
        uses: actions/cache@v5
        with:
          path: /github/home/.ccache
          key: ccache-aarch64-minimal-linux-${{ steps.ver.outputs.major }}-${{ steps.ver.outputs.pkgver }}-${{ steps.ver.outputs.pkgrel }}
          restore-keys: |
            ccache-aarch64-minimal-linux-${{ steps.ver.outputs.major }}-

      - name: Configure ccache
        run: |
          mkdir -p /github/home/.ccache
          echo "CCACHE_DIR=/github/home/.ccache" >> "$GITHUB_ENV"
          echo "CCACHE_COMPILERCHECK=content" >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=2G" >> "$GITHUB_ENV"
          echo "PATH=/usr/lib/ccache/bin:${PATH}" >> "$GITHUB_ENV"

      - name: Prepare signing key
        env:
          NANOPI_R2S_KERNEL_PACMAN_KEY: ${{ secrets.NANOPI_R2S_KERNEL_PACMAN_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NANOPI_R2S_KERNEL_PACMAN_KEY:-}" ]; then
            echo "Error: NANOPI_R2S_KERNEL_PACMAN_KEY secret is required for public release builds." >&2
            exit 1
          fi

          mkdir -p keys
          echo "$NANOPI_R2S_KERNEL_PACMAN_KEY" | base64 -d > keys/signing.key
          chmod 600 keys/signing.key
          gpg --import keys/signing.key
          KEY_ID=$(gpg --with-colons --list-secret-keys | awk -F: '/^sec:/ {print $5; exit}')
          echo "PACMAN_KEY_PATH=$GITHUB_WORKSPACE/keys/signing.key" >> "$GITHUB_ENV"
          echo "PACMAN_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          gpg --export -a "$KEY_ID" > keys/nanopi-r2s-kernel-arch.pub

      - name: Create build user
        run: |
          useradd -m builduser
          mkdir -p /github/home/.ccache
          chown -R builduser:builduser "$GITHUB_WORKSPACE" /github/home/.ccache

      - name: Build package
        run: |
          set -euo pipefail

          su builduser -c '
            set -euo pipefail
            export SKIP_ALARM_FETCH=1
            export CC="ccache aarch64-linux-gnu-gcc"
            export HOSTCC="ccache gcc"
            export CCACHE_DIR=/github/home/.ccache

            ccache -z || true
            ./scripts/build-package.sh
            ccache -s || true
          '

      - name: Prepare source archive
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ steps.publish_names.outputs.release_tag }}" \
            ./scripts/write-source-info.sh

          # shellcheck source=/dev/null
          source build/alarm-version.env
          pkg="linux-nanopi-r2s-minimal-${pkgver}-${pkgrel}"
          srcroot="build/source/${pkg}"

          rm -rf build/source
          mkdir -p "$srcroot"/config "$srcroot"/packaging "$srcroot"/scripts "$srcroot"/LICENSES "$srcroot"/sources

          cp README.md "$srcroot/"
          cp LICENSES/*.txt "$srcroot/LICENSES/"
          cp config/fragment.r2s config/fragment.prune "$srcroot/config/"
          cp config/.alarm.config "$srcroot/config/alarm.config"
          cp build/config.merged "$srcroot/config/config.merged"
          cp build/PKGBUILD build/linux-nanopi-r2s-minimal.install \
            build/linux-nanopi-r2s-minimal.preset \
            build/mkinitcpio.linux-nanopi-r2s-minimal.conf \
            build/*.patch "$srcroot/packaging/"
          cp scripts/*.sh "$srcroot/scripts/"
          cp build/alarm-version.env build/SOURCE_INFO.txt "$srcroot/"
          cp "build/${_srcname}.tar.xz" "build/patch-${pkgver}.xz" "$srcroot/sources/"

          tar --zstd -cf "build/${pkg}-source.tar.zst" -C build/source "$pkg"

      - name: Prepare release files
        run: |
          set -euo pipefail
          PKG_GLOB="$GITHUB_WORKSPACE/build/linux-nanopi-r2s-minimal-*.pkg.tar.zst" \
            REPO_DIR="$GITHUB_WORKSPACE/repo/aarch64" \
            ./scripts/publish-repo.sh
          cp build/SOURCE_INFO.txt repo/aarch64/
          cp build/config.merged repo/aarch64/config.merged
          mkdir -p repo/aarch64/LICENSES
          cp LICENSES/*.txt repo/aarch64/LICENSES/
          (
            cd repo/aarch64
            sha256sum linux-nanopi-r2s-minimal-*.pkg.tar.zst \
              SOURCE_INFO.txt config.merged LICENSES/*.txt > SHA256SUMS
          )
          sha256sum build/linux-nanopi-r2s-minimal-*.pkg.tar.zst \
            build/linux-nanopi-r2s-minimal-*.pkg.tar.zst.sig \
            build/linux-nanopi-r2s-minimal-*-source.tar.zst \
            build/SOURCE_INFO.txt build/config.merged LICENSES/*.txt \
            > build/SHA256SUMS
          [ ! -f keys/nanopi-r2s-kernel-arch.pub ] || cp keys/nanopi-r2s-kernel-arch.pub repo/aarch64/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-nanopi-r2s-minimal-${{ steps.ver.outputs.pkgver }}-${{ steps.ver.outputs.pkgrel }}
          if-no-files-found: error
          path: |
            build/linux-nanopi-r2s-minimal-*.pkg.tar.zst
            build/linux-nanopi-r2s-minimal-*.pkg.tar.zst.sig
            build/linux-nanopi-r2s-minimal-*-source.tar.zst
            build/SHA256SUMS
            build/SOURCE_INFO.txt
            build/config.merged
            LICENSES/*.txt
            repo/aarch64/
            keys/nanopi-r2s-kernel-arch.pub

      - name: Create GitHub Release
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.publish_names.outputs.release_tag }}"
          repo="${GITHUB_REPOSITORY:?}"
          sha="${GITHUB_SHA:?}"
          assets=(
            build/linux-nanopi-r2s-minimal-*.pkg.tar.zst
            build/linux-nanopi-r2s-minimal-*.pkg.tar.zst.sig
            build/linux-nanopi-r2s-minimal-*-source.tar.zst
            build/SHA256SUMS
            build/SOURCE_INFO.txt
            build/config.merged
            LICENSES/*.txt
            keys/nanopi-r2s-kernel-arch.pub
          )
          for asset in "${assets[@]}"; do
            [ -f "$asset" ] || {
              echo "Error: missing release asset: $asset" >&2
              exit 1
            }
          done
          release_flags=()
          if [ "${{ steps.publish_names.outputs.prerelease }}" = true ]; then
            release_flags+=(--prerelease)
          fi

          if gh release view --repo "$repo" "$tag" >/dev/null 2>&1; then
            gh release upload --repo "$repo" "$tag" \
              "${assets[@]}" \
              --clobber
          else
            gh release create --repo "$repo" "$tag" \
              "${assets[@]}" \
              --target "$sha" \
              "${release_flags[@]}" \
              --title "${{ steps.publish_names.outputs.release_title }}" \
              --notes "Unofficial NanoPi R2S minimal kernel ${tag}. Pacman repo: ${{ steps.publish_names.outputs.pages_branch }}/aarch64. Source archive and merged config are included."
          fi

      - name: Deploy pacman repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo/aarch64
          publish_branch: ${{ steps.publish_names.outputs.pages_branch }}
          destination_dir: aarch64
          keep_files: false
          user_name: therealcoder1337
          user_email: 78889972+therealcoder1337@users.noreply.github.com
