name: Check for new ALARM kernel

on:
  schedule:
    - cron: '15 8,20 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: Trigger kernel build even if ALARM pkgver unchanged
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - id: alarm_ver
        run: |
          set -euo pipefail
          alarm_dir="$(mktemp -d)"
          git clone --depth=1 https://github.com/archlinuxarm/PKGBUILDs.git "$alarm_dir"
          pkgbuild="$alarm_dir/core/linux-aarch64/PKGBUILD"
          pkgver=$(awk -F= '/^pkgver=/ { gsub(/[^0-9.a-z]/, "", $2); print $2; exit }' "$pkgbuild")
          pkgrel=$(awk -F= '/^pkgrel=/ { gsub(/[^0-9]/, "", $2); print $2; exit }' "$pkgbuild")
          [ -n "$pkgver" ] && [ -n "$pkgrel" ] || { echo "Error: parse PKGBUILD" >&2; exit 1; }
          current="${pkgver}-${pkgrel}"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "pkgver=$pkgver" >> "$GITHUB_OUTPUT"
          echo "pkgrel=$pkgrel" >> "$GITHUB_OUTPUT"
          echo "ALARM linux-aarch64 version: $current"

      - name: Check existing release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="linux-nanopi-r2s-minimal-${{ steps.alarm_ver.outputs.current }}"
          if gh release view --repo "${{ github.repository }}" "$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists: $tag"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release missing: $tag"
          fi

      - name: Check active kernel builds
        id: active_builds
        if: steps.release.outputs.exists != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_build)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count="$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow build-kernel.yml \
            --status in_progress \
            --json databaseId \
            --jq 'length')"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          [ "$count" -eq 0 ] && echo "busy=false" >> "$GITHUB_OUTPUT" || echo "busy=true" >> "$GITHUB_OUTPUT"

      - name: Check latest completed kernel build
        id: last_build
        if: steps.release.outputs.exists != 'true' && !(github.event_name == 'workflow_dispatch' && inputs.force_build)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          conclusion="$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow build-kernel.yml \
            --status completed \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion // "none"')"
          echo "conclusion=$conclusion" >> "$GITHUB_OUTPUT"
          case "$conclusion" in
            failure|cancelled|timed_out|action_required) echo "blocked=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "blocked=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Trigger kernel build
        if: (steps.release.outputs.exists != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_build)) && steps.active_builds.outputs.busy != 'true' && steps.last_build.outputs.blocked != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run build-kernel.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f "pkgver=${{ steps.alarm_ver.outputs.pkgver }}" \
            -f "pkgrel=${{ steps.alarm_ver.outputs.pkgrel }}"
